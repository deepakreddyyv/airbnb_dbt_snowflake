models:
  - name: dim_listing_cleansed
    data_tests:
      - minimum_row_count:
          arguments:
            min_rows: 100000
          # severity: warn
    columns:
      - name: listing_id
        data_tests:
          - not_null
          - unique
      
      - name: host_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_hosts_cleansed')
              field: host_id
      
      - name: room_type
        data_tests:
          - not_null
          - accepted_values:
              values: [
                'Hotel room',
                'Entire home/apt',
                'Private room',
                'Shared room',
              ]
      - name: minimum_nights
        data_tests:
          - positive_values
    
  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
        data_tests:
          - not_null
          - unique
      
      - name: host_name
        data_type: string
        data_tests:
          - not_null
      
      - name: is_superhost
        data_type: string
        data_tests:
          - not_null
          - accepted_values:
              values: ['t', 'f']
      
      - name: updated_at
        data_type: timestamp
      
      - name: created_at
        data_type: timestamp
  
  